<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Al Mabrur</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00695C">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
    
    // SISTEM PWA CERDAS: Jika dibuka dari Icon Layar Utama HP, langsung alihkan ke Portal Utama!
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        window.location.replace("https://script.google.com/macros/s/AKfycbzpR8jY1XZIeBmhiH7DI5QZlxe9EissoOm4HpNUqF1tMmxPHg9Z2jm1vTER3pXK78PX/exec");
    }
    </script>

    <style>
        body {
            margin: 0; padding: 0; font-family: Arial, sans-serif;
            background-color: #00695C; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }
        .logo-box {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .logo-box img { width: 120px; height: 120px; border-radius: 10px; }
        .btn-buka {
            background: white; color: #00695C; text-decoration: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        #installFab {
            background: #FFC107; color: #000; border: none;
            border-radius: 50px; padding: 15px 30px; font-size: 18px;
            font-weight: bold; cursor: pointer; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <!-- Pastikan gambar icon-192.png ada di github Anda -->
        <img src="icon-192.png" alt="Logo TPQ">
    </div>
    
    <h2 style="margin-bottom: 10px;">Portal TPQ Al Mabrur</h2>
    <p style="margin-bottom: 40px; font-size: 14px; opacity: 0.9; max-width: 80%;">Gunakan tombol di bawah untuk meng-install aplikasi ini ke layar HP Anda.</p>

    <!-- Tombol Buka Manual (jika belum di-install) -->
    <a href="https://script.google.com/macros/s/AKfycbzpR8jY1XZIeBmhiH7DI5QZlxe9EissoOm4HpNUqF1tMmxPHg9Z2jm1vTER3pXK78PX/exec" class="btn-buka">
        🚀 Buka Portal Sekarang
    </a>

    <!-- Tombol Install PWA -->
    <button id="installFab">📱 Install Aplikasi</button>

    <script>
    let deferredPrompt;
    const installFab = document.getElementById("installFab");

    function isInstalled() {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if(!isInstalled()){
            installFab.style.display = "block";
        }
    });

    installFab.onclick = async () => {
        if(deferredPrompt){
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installFab.style.display = "none";
        } else {
            alert("Cara Install Manual:\n\n1. Tekan menu Titik Tiga di pojok kanan atas browser\n2. Pilih 'Tambahkan ke Layar Utama' (Add to Home screen)");
        }
    };
    </script>
</body>
</html>
