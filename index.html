<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal Al Mabrur</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00695C">

<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
    });
}
</script>

<style>

html,
body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* ===========================
   INSTALL POPUP
=========================== */

#installPopup{

    position:fixed;

    left:16px;
    right:16px;
    bottom:20px;

    background:#ffffff;

    border-radius:18px;

    padding:18px;

    box-shadow:0 10px 35px rgba(0,0,0,.25);

    display:none;

    z-index:99999;

    animation:slideUp .35s ease;

}

#installPopup h3{

    margin:0;

    color:#00695C;

    font-size:20px;

}

#installPopup p{

    margin:10px 0 18px;

    color:#555;

    line-height:1.5;

    font-size:15px;

}

.install-buttons{

    display:flex;

    gap:10px;

}

.install-buttons button{

    flex:1;

    border:none;

    border-radius:10px;

    padding:14px;

    font-size:15px;

    cursor:pointer;

}

#installNow{

    background:#00695C;

    color:white;

    font-weight:bold;

}

#laterBtn{

    background:#eeeeee;

}

@keyframes slideUp{

    from{

        transform:translateY(80px);

        opacity:0;

    }

    to{

        transform:translateY(0);

        opacity:1;

    }

}

</style>

</head>

<body>

<iframe src="https://script.google.com/macros/s/AKfycbyNS-OpuyG0qthrHMT80_l7SN1_i_-3gtpT7UqgvxHTK0QJLqSY46VI_qZyZTqo0k_k/exec"></iframe>


<div id="installPopup">

    <h3>📱 Install Portal Al Mabrur</h3>

    <p>
        Install aplikasi agar lebih cepat dibuka,
        tampil fullscreen, dan seperti aplikasi Android.
    </p>

    <div class="install-buttons">

        <button id="laterBtn">
            Nanti
        </button>

        <button id="installNow">
            Install
        </button>

    </div>

</div>

<script>

let deferredPrompt;

const popup=document.getElementById("installPopup");

const installBtn=document.getElementById("installNow");

const laterBtn=document.getElementById("laterBtn");

const THREE_DAYS=3*24*60*60*1000;

function canShowPopup(){

    const last=localStorage.getItem("installLater");

    if(!last) return true;

    return Date.now()-Number(last)>THREE_DAYS;

}

window.addEventListener("beforeinstallprompt",(e)=>{

    e.preventDefault();

    deferredPrompt=e;

    if(canShowPopup()){

        popup.style.display="block";

    }

});

installBtn.onclick=async()=>{

    if(!deferredPrompt) return;

    deferredPrompt.prompt();

    const result=await deferredPrompt.userChoice;

    deferredPrompt=null;

    popup.style.display="none";

};

laterBtn.onclick=()=>{

    localStorage.setItem("installLater",Date.now());

    popup.style.display="none";

};

window.addEventListener("appinstalled",()=>{

    popup.style.display="none";

    localStorage.removeItem("installLater");

});

</script>

</body>

</html>
